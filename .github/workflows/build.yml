name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}
  SERVER_IMAGE: security-detections-mcp
  REFRESHER_IMAGE: security-detections-mcp-refresher

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      # TODO: dependabot/renovate pins to commit SHA on next cycle. actions/checkout@v4.2.2
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: npm audit (high+critical fails build)
        run: npm audit --audit-level=high

  build:
    needs: audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta-server
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.SERVER_IMAGE }}
          tags: |
            type=ref,event=branch
            type=sha,format=long
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta-server.outputs.tags }}
          labels: ${{ steps.meta-server.outputs.labels }}
          cache-from: type=gha,scope=server
          cache-to: type=gha,scope=server,mode=max

      - id: meta-refresher
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.REFRESHER_IMAGE }}
          tags: |
            type=ref,event=branch
            type=sha,format=long
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.refresher
          push: true
          tags: ${{ steps.meta-refresher.outputs.tags }}
          labels: ${{ steps.meta-refresher.outputs.labels }}
          cache-from: type=gha,scope=refresher
          cache-to: type=gha,scope=refresher,mode=max

      - name: Emit digests for Portainer pinning
        run: |
          echo "### Image digests" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "MCP_SERVER_IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.SERVER_IMAGE }}@${{ steps.meta-server.outputs.digest || 'see-tags-above' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "MCP_REFRESHER_IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.REFRESHER_IMAGE }}@${{ steps.meta-refresher.outputs.digest || 'see-tags-above' }}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
