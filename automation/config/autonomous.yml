# Autonomous Detection Engineering Platform Configuration
# Version: 3.0
# Purpose: Configure feeds, scheduling, agents, and outputs

# ═══════════════════════════════════════════════════════════════════════════
# FEED COLLECTION
# ═══════════════════════════════════════════════════════════════════════════
feeds:
  cisa_alerts:
    url: "https://www.cisa.gov/uscert/ncas/alerts.xml"
    type: rss
    poll_interval: 3600  # 1 hour
    enabled: true
    priority: 8  # Higher priority
  
  cisa_kev:
    url: "https://www.cisa.gov/sites/default/files/feeds/known_exploited_vulnerabilities.json"
    type: json
    poll_interval: 86400  # 24 hours
    enabled: true
    priority: 7
  
  mitre_attack:
    type: github
    repo: "mitre/cti"
    url: "https://api.github.com/repos/mitre/cti/commits"
    poll_interval: 86400
    enabled: true
    priority: 5
  
  microsoft_security:
    url: "https://www.microsoft.com/security/blog/feed/"
    type: rss
    poll_interval: 86400
    enabled: false  # Enable as needed
    priority: 4
  
  crowdstrike_blog:
    url: "https://www.crowdstrike.com/blog/feed/"
    type: rss
    poll_interval: 86400
    enabled: false
    priority: 4
  
  sigmahq_rules:
    type: github
    repo: "SigmaHQ/sigma"
    url: "https://api.github.com/repos/SigmaHQ/sigma/commits?path=rules"
    poll_interval: 86400
    enabled: false
    priority: 3

# ═══════════════════════════════════════════════════════════════════════════
# SCHEDULED JOBS
# ═══════════════════════════════════════════════════════════════════════════
schedules:
  feed_collection:
    cron: "0 */1 * * *"  # Every hour
    job_type: feed_collection
    enabled: true
  
  coverage_report:
    cron: "0 0 * * 1"  # Weekly on Monday at midnight
    job_type: coverage_report
    enabled: true
    payload:
      report_type: "weekly_summary"
      include_navigator: true
  
  gap_analysis:
    cron: "0 */12 * * *"  # Every 12 hours
    job_type: gap_analysis
    enabled: true
    payload:
      focus: "critical_severity"
      threat_actors: ["APT29", "APT28", "FIN7"]
  
  database_maintenance:
    cron: "0 2 * * *"  # Daily at 2 AM
    job_type: maintenance
    enabled: true
    payload:
      tasks: ["vacuum", "archive_old_jobs", "cleanup_failed_jobs"]

# ═══════════════════════════════════════════════════════════════════════════
# AGENT CONFIGURATION
# ═══════════════════════════════════════════════════════════════════════════
agent:
  model: "claude-sonnet-4-20250514"
  max_retries: 3
  timeout_minutes: 30
  checkpoint_enabled: true
  
  # Subagent configurations
  subagents:
    orchestrator:
      model: "inherit"
      max_iterations: 20
    
    cti_analyst:
      model: "inherit"
      timeout_minutes: 10
    
    detection_engineer:
      model: "inherit"
      timeout_minutes: 15
    
    atomic_executor:
      model: "inherit"
      is_background: true
      timeout_minutes: 30
    
    verifier:
      model: "fast"
      timeout_minutes: 5

  # Human approval requirements
  human_approval_required:
    - pr_creation
    - high_impact_detections
    - new_data_source_requirements
    - high_fp_risk_detections

# ═══════════════════════════════════════════════════════════════════════════
# ATTACK RANGE INTEGRATION
# ═══════════════════════════════════════════════════════════════════════════
attack_range:
  enabled: true
  path: "${ATTACK_RANGE_PATH}"  # Path to attack_range.py
  default_target: "ar-win-ar-ar-0"
  default_engine: "ART"  # or PurpleSharp
  
  # Available data sources (constraint for detection creation)
  available_data_sources:
    endpoint:
      windows:
        - Sysmon
        - Windows Event Log Security 4688
        - PowerShell
      linux:
        - Sysmon for Linux
    network:
      - Zeek
    edr:
      - CrowdStrike FDR  # Optional, if configured
  
  # Log ingestion wait times
  ingestion_wait_seconds: 120
  
  # Dump configuration
  dump_path: "${ATTACK_DATA_DUMP_PATH}"
  dump_earliest: "2h"

# ═══════════════════════════════════════════════════════════════════════════
# OUTPUT CONFIGURATION
# ═══════════════════════════════════════════════════════════════════════════
outputs:
  github:
    security_content:
      repo: "splunk/security_content"
      base_branch: "develop"
      auto_pr: true
      always_draft: true  # NEVER auto-merge
      require_review: true
    
    attack_data:
      repo: "splunk/attack_data"
      base_branch: "master"
      auto_pr: true
      always_draft: true  # NEVER auto-merge
      require_review: true
  
  slack:
    webhook_url: "${SLACK_WEBHOOK_URL}"
    channel: "#detection-engineering"
    enabled: false
    notifications:
      - detection_validated
      - validation_failed
      - coverage_gap
      - prs_staged
  
  discord:
    webhook_url: "${DISCORD_WEBHOOK_URL}"
    enabled: false
  
  email:
    smtp_host: "${SMTP_HOST}"
    smtp_port: 587
    from: "autonomous-detection@example.com"
    to: ["security-team@example.com"]
    enabled: false

# ═══════════════════════════════════════════════════════════════════════════
# DETECTION CONSTRAINTS
# ═══════════════════════════════════════════════════════════════════════════
constraints:
  # Only create detections for these security domains
  allowed_security_domains:
    - endpoint
    - network
    - cloud
  
  # Maximum detections per technique
  max_detections_per_technique: 3
  
  # False positive risk threshold
  max_fp_risk: "medium"  # low, medium, high, critical
  
  # Minimum confidence for threat intel extraction
  min_technique_confidence: 0.7

# ═══════════════════════════════════════════════════════════════════════════
# LEARNING & MEMORY
# ═══════════════════════════════════════════════════════════════════════════
learning:
  reflection_enabled: true
  
  # Reflection triggers
  reflection_triggers:
    micro: "after_each_detection"
    meso: "after_10_detections_per_category"
    macro: "weekly"
  
  # Campaign tracking
  campaign_tracking:
    enabled: true
    track_coverage_evolution: true
  
  # Pattern extraction
  pattern_extraction:
    enabled: true
    min_pattern_occurrences: 3

# ═══════════════════════════════════════════════════════════════════════════
# OBSERVABILITY
# ═══════════════════════════════════════════════════════════════════════════
observability:
  logging:
    level: "info"  # debug, info, warn, error
    format: "json"
    file: "${LOG_PATH}/autonomous-detection.log"
  
  metrics:
    enabled: true
    export_interval: 300  # seconds
    
    tracked_metrics:
      - feed_items_ingested
      - jobs_processed
      - detections_created
      - validations_passed
      - validations_failed
      - prs_staged
      - coverage_improvement
      - time_to_detection

# ═══════════════════════════════════════════════════════════════════════════
# DATABASE
# ═══════════════════════════════════════════════════════════════════════════
database:
  path: "${DETECTIONS_DB_PATH}"
  backup_enabled: true
  backup_interval: 86400  # Daily
  backup_path: "${DETECTIONS_DB_PATH}.backups"
  
  # Job retention
  retention:
    completed_jobs_days: 30
    failed_jobs_days: 90
    feed_items_days: 180
